<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Unity WebGL | metaverse</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        width: 100%;
        height: 100%;
      }

      #unity-container {
        width: 100%;
        height: 100vh;
        position: relative;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }

      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-family: Arial, sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="loading">Loading...</div>
    </div>

    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loading = document.querySelector("#loading");

      const config = {
        dataUrl: "./Build/WebGL.data",
        frameworkUrl: "./Build/WebGL.framework.js",
        codeUrl: "./Build/WebGL.wasm",
        streamingAssetsUrl: "./StreamingAssets",
        companyName: "DefaultCompany",
        productName: "metaverse",
        productVersion: "0.1",
      };

      const script = document.createElement("script");
      script.src = "./Build/WebGL.loader.js";

      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          loading.innerHTML = "Loading " + Math.round(progress * 100) + "%";
        })
          .then((unityInstance) => {
            loading.style.display = "none";
          })
          .catch((err) => {
            console.error(err);
            loading.innerHTML = "Unity 로딩 실패";
            alert(err);
          });
      };

      script.onerror = () => {
        loading.innerHTML = "public.loader.js 로딩 실패";
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
